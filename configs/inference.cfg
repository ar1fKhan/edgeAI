# ── Camera Configuration ────────────────────────────────────────
camera.device_id    = 0
camera.width        = 1920
camera.height       = 1080
camera.fps          = 30
camera.backend      = v4l2        # v4l2, gige, usb3, gstreamer
camera.trigger_mode = false
camera.exposure_us  = 10000
camera.gain         = 1.0

# ── Inference Configuration ─────────────────────────────────────
inference.model_path          = models/defect_detector.onnx
inference.input_width         = 640
inference.input_height        = 640
inference.num_classes         = 5
inference.conf_threshold      = 0.50    # Minimum confidence for REJECT
inference.nms_threshold       = 0.45    # Non-Maximum Suppression IoU threshold
inference.review_threshold    = 0.30    # Below conf but above this → REVIEW
inference.num_threads         = 4
inference.use_gpu             = false
inference.execution_provider  = cpu     # cpu, cuda, tensorrt, openvino

# ── Pipeline Configuration ──────────────────────────────────────
pipeline.queue_capacity       = 32
pipeline.defect_image_dir     = data/defects
pipeline.database_path        = data/defects.db
pipeline.save_defect_images   = true
pipeline.enable_display       = false
pipeline.enable_gpio          = false
pipeline.gpio_reject_pin      = 17
pipeline.gpio_pulse_ms        = 200
